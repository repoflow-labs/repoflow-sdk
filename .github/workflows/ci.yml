name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  sdk-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: npm run lint
        run: npm run lint
      - name: npm run typecheck
        run: npm run typecheck
      - name: npm test
        run: npm test
      - name: npm run build
        run: npm run build